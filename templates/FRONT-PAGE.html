<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HSC-CodeMe</title>
  <style>
    body, html {
      overflow: hidden;
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background:linear-gradient(rgb(229, 228, 228), rgb(255, 255, 255));
      color: #111827;
    }

    .hero {
      height: 100vh;
      display: flex;
      align-items: center;          /* vertical center */
      justify-content: center;    /* push content to the right */
      padding: 0 5vw;               /* some breathing room from right edge */
      box-sizing: border-box;
      max-width: 100%;
    }

    .content {
      max-width: 620px;             /* controls how wide the text block is */
      text-align: center;            /* right-align all text inside */
      margin-left: 10vw;
    }

    .title {
      font-size: clamp(2rem, 3vw, 10rem);
      font-weight: 800;
      line-height: 1.05;
      margin: 0 0 1.2rem 0;
      letter-spacing: -0.02em;
    }

    .subtitle {
      font-size: clamp(1rem, 1.6vw, 5rem);
      font-weight: 400;
      color: #374151;
      margin: 0 0 2rem 0;
      line-height: 1.4;
    }
/* ───────────────────────────────────────────────────── */
/*          Individual button style | LOGIN PAGE         */
/* ───────────────────────────────────────────────────── */
    .buttonsFrontPage {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: clamp(1rem, 1vw, 2rem);
    

      flex-wrap: wrap;
      gap: 4rem;
      justify-content: center;
      margin-top: 2rem;
      height: 5em;
      width: 10em;
      padding: 0 1.4em;         /* gives nice horizontal breathing room */
      min-width: 100px;         /* your original target width — adjust if needed */
      background-color: #ffffff;
      border: none;
      border-radius: 12px;       /* modern & soft — change to 6px or 12px to taste */
      /* Base neumorphic shadow */
      box-shadow: 
      5px  5px 15px #d3d3d3,
      -5px -5px 15px #ffffff;

      font-weight: 500;         /* usually looks better than normal weight */
      color: #333;
      cursor: pointer;

      transition: all 0.25s ease; /* Transistion of effects like hover */
      }

      .buttonsFrontPage:hover {
      box-shadow: 
      10px  10px 25px #ababab, /* Creating a shadow above the button*/
      -10px -10px 25px #dadada; /* Creating a shadow below the button*/
      transform: translateY(-10px);
      }
      .buttonRow {
        display: flex;
        justify-content: center;
        gap: 3rem; /* space between buttons */
        margin-top: 2rem;
      }

  </style>
<script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>


</head>
<body>
  <div class="hero">


    <!-- ANIMATION ON LEFT SIDE OF FRONT PAGE-->
    <lottie-player
      src="static/Front-Page-Animation.json"
      background="transparent"
      speed="0.7"
      style="width: 1000px; height: 1000px; margin-right: 1vw;"  
      loop  
      autoplay>
    </lottie-player>




    <div class="content">
      <h1 class="title">HSC-CodeMe</h1>
      
      <p class="subtitle">
        “A simple web app that helps HSC Software Engineering students learn and improve their code.”
      </p>

        <div class="buttonRow">
        <form action="{{ url_for('LOGIN') }}" method="get">
        <button class="buttonsFrontPage" type="submit">Login</button></form>

        <form action="{{ url_for('REGISTER') }}" method="get">
        <button class="buttonsFrontPage" type="submit">Register</button>
        </form>
        </div>
    </div>
  </div>

</body>
</html>
