<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register - HSC-CodeMe</title>

   <!-- CSS STYLE FOR PAGE -->
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(rgb(229, 228, 228), rgb(255, 255, 255));
      color: #111827;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .register-container {
      background-color: #fefefe;
      padding: 3rem 2rem;
      border-radius: 12px;
      box-shadow: 10px 10px 30px #d3d3d3, -10px -10px 30px #ffffff;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    .register-container h1 {
      font-size: clamp(2rem, 3vw, 4rem);
      font-weight: 800;
      margin-bottom: 1rem;
    }

    .register-container p {
      color: #374151;
      margin-bottom: 2rem;
      line-height: 1.4;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"] {
      padding: 0.75rem 1rem;
      font-size: 1rem;
      border-radius: 8px;
      border: none;
      box-shadow: inset 5px 5px 15px #d3d3d3, inset -5px -5px 15px #ffffff;
      transition: all 0.25s ease;
    }

    input[type="text"]:focus,
    input[type="email"]:focus,
    input[type="password"]:focus {
      outline: none;
      box-shadow: inset 3px 3px 10px #ababab, inset -3px -3px 10px #ffffff;
    }

    .register-button {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: clamp(1rem, 1vw, 1.5rem);
      background-color: #ffffff;
      border: none;
      border-radius: 12px;
      box-shadow: 5px 5px 15px #d3d3d3, -5px -5px 15px #ffffff;
      font-weight: 500;
      color: #333;
      cursor: pointer;
      padding: 0.75rem 1rem;
      transition: all 0.25s ease;
    }

    .register-button:hover {
      box-shadow: 10px 10px 25px #ababab, -10px -10px 25px #dadada;
      transform: translateY(-3px);
    }

    .login-link {
      margin-top: 1rem;
      font-size: 0.9rem;
      color: #374151;
    }

    .login-link a {
      color: #1d4ed8;
      text-decoration: none;
      font-weight: 500;
    }

    .login-link a:hover {
      text-decoration: underline;
    }

    .back-button {
        position: absolute;
        top: 20px;
        left: 20px;
        cursor: pointer;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        font-size: clamp(1rem, 1vw, 2rem);
        flex-wrap: wrap;
        justify-content: center;
        padding: 0.5em 0.5em;         /* gives nice horizontal breathing room */
        background-color: #ffffff;
        border: none;
        border-radius: 12px;       /* modern & soft — change to 6px or 12px to taste */
        /* Base neumorphic shadow */
        box-shadow: 
        5px  5px 15px #d3d3d3,
        -5px -5px 15px #ffffff;

        font-weight: 500;         /* usually looks better than normal weight */
        color: #333;
        cursor: pointer;

        transition: all 0.25s ease; /* Transistion of effects like hover */
        }

  </style>









</head>
<body>
  <div class="register-container">
    <button class="back-button" onclick="history.back()">Back</button>  <!--Back button-->
    <h1>Register</h1>
    <p>Create your account to start learning HSC Software Engineering.</p>
    <form action="{{ url_for('REGISTER') }}" method="post">

      <input type="text" 
      name="displayName" 
      placeholder="Display Name" 
      required>

      <input type="email" 
      name="email" 
      placeholder="Email (education.nsw.gov.au)" 
      required>

      <input type="password"
       name="password" 
       placeholder="Password" 
       required>


      <button type="submit" class="register-button">Sign Up</button>
    </form>
    <div class="login-link">
      Already have an account? <a href="{{ url_for('LOGIN') }}">Login</a>
    </div>
  </div>
</body>
</html>
