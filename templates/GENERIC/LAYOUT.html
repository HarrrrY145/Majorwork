
<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta http-equiv="X-UA-Compatible" content="IE=edge">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>HSC-CodeMe</title>
<!-- Favico -->
   <link rel="icon" type="image/png" href="static/favicon/favicon-96x96.png" sizes="96x96" />
   <link rel="icon" type="image/svg+xml" href="static/favicon/favicon.svg" />
   <link rel="shortcut icon" href="static/favicon/favicon.ico" />
   <link rel="manifest" href="static/favicon/site.webmanifest" />
<!-- font awesome cdn link -->
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.2/css/all.min.css">

<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@200;300;400;500;600;700&display=swap');

:root{
   --main-color:#8e44ad;
   --red:#e74c3c;
   --orange:#f39c12;
   --light-color:#888;
   --light-bg:#eee;
   --black:#2c3e50;
   --white:#fff;
   --border:.1rem solid rgba(0,0,0,.2);
}

/* GLOBAL */
*{
   font-family: 'Nunito', sans-serif;
   margin:0; padding:0;
   box-sizing: border-box;
   outline: none; border:none;
   text-decoration: none;
}

*::selection{
   background-color: var(--main-color);
   color:#fff;
}

html{
   font-size: 62.5%;
   overflow-x: hidden;
}

html::-webkit-scrollbar{
   width: 1rem;
   height: .5rem;
}

html::-webkit-scrollbar-track{
   background-color: transparent;
}

html::-webkit-scrollbar-thumb{
   background-color: var(--main-color);
}

body{
   background-color: var(--light-bg);
   padding-left: 1rem;
   width: auto;
}

body.active{
   padding-left: 0;
}

section{
   padding:2rem;
   margin: 0 auto;
   max-width: 1300px;
   position: absolute;
   left: 30rem;
}

/* BUTTONS */
.btn,
.option-btn{
   border-radius: .5rem;
   color:#fff;
   font-size: 1.8rem;
   cursor: pointer;
   text-transform: capitalize;
   padding:1rem 3rem;
   text-align: center;
   margin-top: 1rem;
   display: block;
   width: 100%;
}

.btn{
   background-color: var(--main-color);
}

.option-btn{
   background-color:var(--orange);
}

.btn:hover,
.option-btn:hover{
   background-color: var(--black);
   color: var(--white);
}

.flex-btn{
   display: flex;
   gap: 1rem;
}

/* HEADER */
.header{
   position: sticky;
   top:0; left:0; right: 0;
   background-color: var(--white);
   z-index: 1000;
   border-bottom: var(--border);
}

.header .flex{
   display: flex;
   align-items: center;
   justify-content: space-between;
   position: relative;
   padding: 1.5rem 2rem;
}

.header .flex .logo{
   font-size: 2.5rem;
   color: var(--black);
}

.header .flex .search-form{
   width: 50rem;
   border-radius: .5rem;
   background-color: var(--light-bg);
   padding:1.5rem 2rem;
   display: flex;
   gap:2rem;
}

.header .flex .search-form input{
   width: 100%;
   font-size: 1.8rem;
   color:var(--black);
   background:none;
}

.header .flex .search-form button{
   background:none;
   font-size: 2rem;
   cursor: pointer;
   color:var(--black);
}

.header .flex .search-form button:hover{
   color: var(--main-color);
}

.header .flex .icons div{
   font-size: 2rem;
   color:var(--black);
   background-color: var(--light-bg);
   border-radius: .5rem;
   height: 4.5rem;
   width: 4.5rem;
   line-height: 4.5rem;
   cursor: pointer;
   text-align: center;
   margin-left: .7rem;
}

.header .flex .icons div:hover{
   background-color: var(--black);
   color:var(--white);
}

.header .flex .profile{
   position: absolute;
   top:120%; right: 2rem;
   background-color: var(--white);
   border-radius: .5rem;
   padding: 1.5rem;
   text-align: center;
   overflow: hidden;
   transform-origin: top right;
   transform: scale(0);
   transition: .2s linear;
   width: 30rem;
}

.header .flex .profile.active{
   transform: scale(1);
}

.header .flex .profile .image{
   height: 10rem;
   width: 10rem;
   border-radius: 50%;
   object-fit: contain;
   margin-bottom: 1rem;
}

.header .flex .profile .name{
   font-size: 2rem;
   color:var(--black);
   overflow: hidden;
   text-overflow: ellipsis;
   white-space: nowrap;
}

.header .flex .profile .role{
   font-size: 1.8rem;
   color: var(--light-color);
}

/* ICON CONTROL */
#search-btn{
   display: none;
}

/* SIDEBAR */
.side-bar{
   position: fixed;
   top: 0; left: 0;
   width: 30rem;
   background-color: var(--white);
   height: 100vh;
   border-right: var(--border);
   z-index: 1200;
}

.side-bar #close-btn{
   text-align: right;
   padding: 2rem;
   display: none;
}

.side-bar #close-btn i{
   font-size: 2.5rem;
   background:var(--red);
   border-radius: .5rem;
   color:var(--white);
   cursor: pointer;
   height: 4.5rem;
   width: 4.5rem;
   line-height: 4.5rem;
   text-align: center;
}

.side-bar #close-btn i:hover{
   background-color: var(--black);
}

.side-bar .profile{
   padding:3rem 2rem;
   text-align: center;
}

.side-bar .profile .image{
   height: 10rem;
   width: 10rem;
   border-radius: 50%;
   object-fit: contain;
   margin-bottom: 1rem;
}

.side-bar .profile .name{
   font-size: 2rem;
   color:var(--black);
}

.side-bar .profile .role{
   font-size: 1.8rem;
   color: var(--light-color);
}

.side-bar .navbar a{
   display: block;
   padding: 2rem;
   font-size: 2rem;
}

.side-bar .navbar a i{
   margin-right: 1.5rem;
   color:var(--main-color);
   transition: .2s linear;
}

.side-bar .navbar a span{
   color:var(--light-color);
}

.side-bar .navbar a:hover{
   background-color: var(--light-bg);
}

.side-bar .navbar a:hover i{
   margin-right: 2.5rem;
}

.side-bar.active{
   left: -30rem;
}

/* RESPONSIVE */
@media (max-width:1200px){
   body{
      padding-left: 0;
   }

   .side-bar{
      left: -30rem;
      transition: .2s linear;
   }

   .side-bar #close-btn{
      display: block;
   }

   .side-bar.active{
      left: 0;
      box-shadow: 0 0 0 100vw rgba(0,0,0,.8);
      border-right: 0;
   }
}

@media (max-width:991px){
   html{
      font-size: 55%;
   }
}

@media (max-width:768px){
   #search-btn{
      display: inline-block;
   }

   .header .flex .search-form{
      position: absolute;
      top: 99%; left: 0; right: 0;
      border-top: var(--border);
      border-bottom: var(--border);
      background-color: var(--white);
      border-radius: 0;
      width: auto;
      padding: 2rem;
      clip-path: polygon(0 0, 100% 0, 100% 0, 0 0);
      transition: .2s linear;
   }

   .header .flex .search-form.active{
      clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
   }
}

@media (max-width:450px){
   html{
      font-size: 50%;
   }

   .flex-btn{
      gap: 0;
      flex-flow: column;
   }
}
</style>

</head>
<body>

<header class="header">
   
   <section class="flex">
      <!------------------------------------------------------------------------------------------------------------------------------>
      <!-- SEARCH BAR-->
      <form action="search.html" method="post" class="search-form"> 
         <input type="text" name="search_box" required placeholder="search courses..." maxlength="100">
         <button type="submit" class="fas fa-search"></button>
      </form>
      <!------------------------------------------------------------------------------------------------------------------------------>


      <!------------------------------------------------------------------------------------------------------------------------------>
      <!-- Icons in navbar -->
      <div class="icons">
         <div id="search-btn" class="fas fa-search"></div>
         <div id="user-btn" class="fas fa-user"></div>
         <div id="toggle-btn" class="fas fa-sun"></div>
         <div id="menu-btn"class="fa-solid fa-arrow-right-from-bracket"></div>

      </div>
      <!------------------------------------------------------------------------------------------------------------------------------>


      <!------------------------------------------------------------------------------------------------------------------------------>
      <!-- Profile -->
      <div class="profile">
         <img src="images/pic-1.jpg" class="image" alt="">

         <!-- Display user name-->
         <h3 class="name">shaikh anas</h3>
         
         <!-- Display user role-->
         <p class="role">student</p>
         <a href="profile.html" class="btn">view profile</a>
         <div class="flex-btn">
            <a href="login.html" class="option-btn">login</a>
            <a href="register.html" class="option-btn">register</a>
         </div>
      </div>
      <!------------------------------------------------------------------------------------------------------------------------------>

   </section>

</header>   

<div class="side-bar">

   <div id="close-btn">
      <i class="fas fa-times"></i>
   </div>

   <div class="profile">
      <img src="images/pic-1.jpg" class="image" alt="">
      <h3 class="name">shaikh anas</h3>
      <p class="role">studen</p>
      <a href="profile.html" class="btn">view profile</a>
   </div>



<!-- NAVIGATION BAR-->

<nav class="navbar">
<!-- HOME PAGE -->
    <a href="{{ url_for('HOMEPAGE') }}">
    <i class="fas fa-home"></i><span>home</span>
   </a>

<!-- Progress Analytics -->
   <a href="{{ url_for('PROGRESS_ANALYTICS') }}">
   <i class="fa-solid fa-arrow-trend-up"></i><span>Progress Analytics</span>
   </a>

<!-- classroom TEACHER ONLY -->
   <a href="{{ url_for('CLASSROOM') }}">
   <i class="fas fa-chalkboard-user"></i><span>Class</span>
   </a>

<!-- SOFTWARE ACTIVITIES  -->
   <a href="{{ url_for('ACTIVITIES') }}">
   <i class="fa-solid fa-code"></i><span>Software Activities</span>
   </a>

<!-- PRACTICE-TESTS -->
   <a href="{{ url_for('PRACTICE_TESTS') }}">
   <i class="fas fa-graduation-cap"></i><span> Practice Tests</span>
   </a>

<!-- MODULES -->
   <a href="{{ url_for('MODULES') }}">
   <i class="fa-solid fa-folder-open"></i><span>Modules</span>
   </a>

<!-- MESSAGE BOARD -->
   <a href="{{ url_for('MESSAGE_BOARD') }}">
   <i class="fa-regular fa-message"></i><span>Message Board</span>
   </a>



</nav>
</div>

<!-- custom js file link  -->
<script src="js/script.js"></script>
<main>{% block content %}{% endblock %}</main>
</body>
</html>
