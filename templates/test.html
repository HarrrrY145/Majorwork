<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Message Board</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@200;300;400;500;600;700&display=swap');

:root{
   --main-color:#8e44ad;
   --red:#e74c3c;
   --orange:#f39c12;
   --light-color:#888;
   --light-bg:#eee;
   --black:#2c3e50;
   --white:#fff;
   --border:.1rem solid rgba(0,0,0,.2);
}

/* GLOBAL */
*{
   font-family: 'Nunito', sans-serif;
   margin:0;
   padding:0;
   box-sizing:border-box;
}

body{
   background: var(--light-bg);
   display:flex;
   justify-content:center;
   align-items:center;
   height:100vh;
}

/* CHAT WRAPPER */
.chat-box{
   width:90%;
   max-width:85rem;
   height:80vh;
   background:var(--white);
   border:var(--border);
   border-radius:1rem;
   display:flex;
   flex-direction:column;
   overflow:hidden;
}

/* HEADER */
.chat-header{
   display:flex;
   align-items:center;
   gap:1rem;
   padding:1.5rem 2rem;
   border-bottom:var(--border);
   background:var(--white);
}

.chat-header img{
   width:5rem;
   height:5rem;
   border-radius:50%;
}

.chat-header h3{
   font-size:1.8rem;
   color:var(--black);
}

.chat-header span{
   font-size:1.3rem;
   color:var(--light-color);
}

/* MESSAGES */
.chat-messages{
   flex:1;
   padding:2rem;
   background:var(--light-bg);
   overflow-y:auto;
}

/* MESSAGE ROW */
.msg{
   display:flex;
   align-items:flex-end;
   margin-bottom:1.5rem;
   gap:1rem;
}

/* PROFILE IMAGE */
.msg img{
   width:4rem;
   height:4rem;
   border-radius:50%;
}

/* BUBBLE */
.bubble{
   max-width:60%;
   padding:1rem 1.5rem;
   border-radius:1rem;
   font-size:1.5rem;
   line-height:1.4;
}

/* TEACHER LEFT */
.teacher{
   justify-content:flex-start;
}

.teacher .bubble{
   background:var(--white);
   border:var(--border);
   color:var(--black);
}

/* STUDENT RIGHT */
.student{
   justify-content:flex-end;
}

.student .bubble{
   background:var(--main-color);
   color:var(--white);
}

/* INPUT AREA */
.chat-input{
   display:flex;
   padding:1.5rem;
   border-top:var(--border);
   background:var(--white);
   gap:1rem;
}

.chat-input input{
   flex:1;
   padding:1rem 1.5rem;
   border:var(--border);
   border-radius:.5rem;
   font-size:1.5rem;
   background:var(--light-bg);
}

.chat-input button{
   padding:1rem 2rem;
   border:none;
   border-radius:.5rem;
   background:var(--main-color);
   color:var(--white);
   font-size:1.5rem;
   cursor:pointer;
}

.chat-input button:hover{
   background:var(--black);
}
</style>

</head>

<body>

<div class="chat-box">

   <!-- HEADER -->
   <div class="chat-header">
      <img src="https://i.pravatar.cc/100?img=12">
      <div>
         <h3>Mr Smith</h3>
         <span>Teacher</span>
      </div>
   </div>

   <!-- MESSAGES -->
   <div class="chat-messages">

      <div class="msg teacher">
         <img src="https://i.pravatar.cc/100?img=12">
         <div class="bubble">
            Hi, do you need help with Module 4?
         </div>
      </div>

      <div class="msg student">
         <div class="bubble">
            Yes — I’m stuck on APIs 😅
         </div>
         <img src="https://i.pravatar.cc/100?img=5">
      </div>

      <div class="msg teacher">
         <img src="https://i.pravatar.cc/100?img=12">
         <div class="bubble">
            Let’s break it down step by step.
         </div>
      </div>

   </div>

   <!-- INPUT -->
   <div class="chat-input">
      <input type="text" placeholder="Type a message...">
      <button>Send</button>
   </div>

</div>

</body>
</html>
